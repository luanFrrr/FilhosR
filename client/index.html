<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1, viewport-fit=cover"
    />
    <meta name="theme-color" content="#f8fbfa" />
    <meta
      name="theme-color"
      media="(prefers-color-scheme: light)"
      content="#f8fbfa"
    />
    <meta
      name="theme-color"
      media="(prefers-color-scheme: dark)"
      content="#090e1a"
    />
    <meta
      name="description"
      content="Acompanhe o crescimento, vacinas, saúde e memórias dos seus filhos. Feito com carinho para pais brasileiros."
    />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta
      name="apple-mobile-web-app-status-bar-style"
      content="black-translucent"
    />
    <meta name="apple-mobile-web-app-title" content="Filhos" />
    <title>Filhos - Acompanhe o Crescimento</title>
    <link rel="icon" type="image/png" href="/favicon.png" />
    <link rel="manifest" href="/manifest.json?v=20260321" />
    <link rel="apple-touch-icon" href="/icons/icon-192x192.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Architects+Daughter&family=DM+Sans:wght@400;500;700&family=Outfit:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <style id="early-bg">
      html, body, #root { background-color: #f8fbfa; }
      @media (prefers-color-scheme: dark) {
        html, body, #root { background-color: #090e1a; }
      }
    </style>
  </head>
  <body>
    <script>
      !(function () {
        var e = localStorage.getItem("theme");
        var childTheme = localStorage.getItem("activeChildTheme");
        var isDark =
          "dark" === e ||
          ((!e || "system" === e) &&
            matchMedia("(prefers-color-scheme:dark)").matches);
        if (childTheme && childTheme !== "default" && childTheme !== "neutral") {
          document.documentElement.setAttribute("data-theme", childTheme);
        } else {
          document.documentElement.removeAttribute("data-theme");
        }
        if (isDark) {
          document.documentElement.classList.add("dark");
        } else {
          document.documentElement.classList.remove("dark");
        }
        var bgColor = isDark ? "#090e1a" : "#f8fbfa";
        var themeBarColor = bgColor;
        if (childTheme === "pink") {
          themeBarColor = isDark ? "#32202a" : "#f3e3e9";
        } else if (childTheme === "blue") {
          themeBarColor = isDark ? "#1f2935" : "#e4edf5";
        }
        var metas = document.querySelectorAll('meta[name="theme-color"]');
        metas.forEach(function (m) {
          m.setAttribute("content", themeBarColor);
        });
        document.documentElement.style.backgroundColor = bgColor;
        document.body.style.backgroundColor = bgColor;
        if (document.getElementById("root")) {
          document.getElementById("root").style.backgroundColor = bgColor;
        }
        document.documentElement.style.colorScheme = isDark ? "dark" : "light";
      })();
    </script>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      if ("serviceWorker" in navigator) {
        window.addEventListener("load", () => {
          navigator.serviceWorker
            .register("/sw.js?v=20260321")
            .then((registration) => {
              console.log("SW registered:", registration.scope);
            })
            .catch((error) => {
              console.log("SW registration failed:", error);
            });
        });
      }
    </script>
  </body>
</html>
